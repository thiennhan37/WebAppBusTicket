version: '3.9'

services:

  mysql:
    image: mysql:9.3
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8
    container_name: redis-ticket
    ports:
      - "6380:6379"

  backend:
    build: .
    container_name: backend
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
      REDIS_HOST: redis
      REDIS_PORT: 6379

volumes:
  mysql_data: